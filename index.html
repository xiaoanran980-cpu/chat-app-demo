<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霁语·轻聊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="icon" style="color:#fff;font-size:20px;">☁️</span>
      <h1>霁语·轻聊</h1>
    </div>
    <div class="chat-content">
      <aside class="sidebar">
        <div class="sidebar-item">
          <label>我的ID</label>
          <div class="id-box" id="myId">加载中...</div>
          <button id="editNameBtn" style="margin-top:8px;padding:6px 12px;background:#667eea;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">修改昵称</button>
        </div>
        <div class="sidebar-item">
          <label>聊天对象</label>
          <div class="id-box" id="targetId">未选择</div>
        </div>
        <div class="sidebar-item">
          <label>选择聊天用户</label>
          <select class="select-btn" id="selectBtn"></select>
        </div>
        <div class="sidebar-item">
          <label>在线用户</label>
          <div class="id-box online-user" id="onlineUser">加载中...</div>
        </div>
        <div class="sidebar-item">
          <label>未读消息</label>
          <div class="id-box unread-messages" id="unreadMessages" style="min-height:60px;">暂无未读消息</div>
        </div>
      </aside>
      <main class="chat-main">
        <div class="control-bar">
          <button id="clearBothBtn">双向销毁</button>
        </div>
        <div class="messages-area" id="msgArea"></div>
        <div class="input-area">
          <textarea id="msgInput" placeholder="输入消息..."></textarea>
          <button class="send-btn" id="sendBtn">发送</button>
        </div>
      </main>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
