<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霁语·轻聊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="icon" style="color:#fff;font-size:20px;">☁️</span>
      <h1>霁语·轻聊</h1>
    </div>
    <div class="chat-content">
      <aside class="sidebar">
        <!-- 用户信息区域 -->
        <div class="user-info-section">
          <div class="user-header">
            <span class="user-label">我的昵称</span>
            <button id="editNameBtn" class="edit-btn" title="修改昵称">修改昵称</button>
          </div>
          <div class="user-name" id="myId">加载中...</div>
        </div>

        <!-- 聊天对象选择 - 点击展开在线用户 -->
        <div class="chat-target-section" id="chatTargetSection">
          <label>聊天对象</label>
          <div class="target-display-box" id="targetDisplayBox">
            <span id="targetId">点击选择用户...</span>
            <span class="arrow-icon">▼</span>
          </div>
        </div>

        <!-- 在线用户列表 - 可折叠 -->
        <div class="online-section" id="onlineSection" style="display:none;">
          <div class="online-header" id="onlineHeader">
            <label>在线用户 <span class="online-count" id="onlineCount">0</span></label>
            <span class="arrow-icon">▲</span>
          </div>
          <div class="online-list" id="onlineUser">加载中...</div>
        </div>

        <!-- 未读消息 -->
        <div class="unread-section">
          <label>未读消息</label>
          <div class="unread-list" id="unreadMessages">暂无未读消息</div>
        </div>
      </aside>
      <main class="chat-main">
        <div class="control-bar">
          <button id="clearBothBtn">🗑️ 清空聊天记录</button>
        </div>
        <div class="messages-area" id="msgArea"></div>
        <div class="input-area">
          <textarea id="msgInput" placeholder="输入消息..."></textarea>
          <button class="send-btn" id="sendBtn">发送</button>
        </div>
      </main>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
